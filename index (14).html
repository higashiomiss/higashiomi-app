<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;background:#f5f5f5;font-size:15px}
:root{--navy:#1a3a7a;--gold:#e8a020;--lb:#e8f0fb;--bd:#dde3ef;--sub:#5a6480;--red:#d94040;--gr:#2a7a4a}
.app{max-width:600px;margin:0 auto;display:flex;flex-direction:column;min-height:100vh}
.hdr{background:var(--navy);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.hl{display:flex;align-items:center;gap:10px}
.logo{width:54px;height:54px;object-fit:contain;background:#fff;border-radius:6px;padding:3px;flex-shrink:0}
.ht{color:#fff;font-size:17px;font-weight:700}.hs{font-size:11px;color:#aabde8}
.bw{display:flex;gap:6px}
.nb{position:relative;background:rgba(255,255,255,0.15);border:none;border-radius:8px;width:40px;height:40px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.nd{position:absolute;top:5px;right:5px;background:var(--gold);border-radius:50%;min-width:17px;height:17px;font-size:10px;color:#fff;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 2px}
.lw{display:flex;gap:3px;margin-bottom:5px;justify-content:flex-end}
.lbtn{background:rgba(255,255,255,0.15);border:none;border-radius:5px;color:#fff;padding:4px 8px;font-size:11px;cursor:pointer;font-family:inherit}
.lbtn.on{background:var(--gold)}
nav{display:flex;background:var(--navy);border-top:1px solid rgba(255,255,255,0.1)}
.nb2{flex:1;padding:6px 2px 7px;background:none;border:none;color:rgba(255,255,255,0.6);font-size:9px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;border-bottom:3px solid transparent;font-family:inherit}
.nb2.on{color:#fff;border-bottom-color:var(--gold);background:rgba(255,255,255,0.08)}
.ni{font-size:19px}
.ct{flex:1;padding:11px}
.pg{display:none}.pg.on{display:block}
.card{background:#fff;border-radius:12px;border:0.5px solid var(--bd);padding:13px;margin-bottom:11px}
.tit{font-size:13px;font-weight:500;color:var(--sub);margin-bottom:9px}
.btn{background:var(--navy);color:#fff;border:none;border-radius:8px;padding:10px 16px;font-size:14px;cursor:pointer;font-weight:500;font-family:inherit}
.bg{background:var(--gold)}.bsm{padding:7px 13px;font-size:13px}
.bo{background:transparent;border:1.5px solid var(--navy);color:var(--navy)}
.shd{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px}
.cn{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.cm{font-size:17px;font-weight:700;color:var(--navy)}
.ca{background:none;border:0.5px solid var(--bd);border-radius:6px;width:32px;height:32px;cursor:pointer;font-size:16px;color:var(--navy)}
.cg{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.ch{text-align:center;font-size:11px;color:var(--sub);padding:3px 0;font-weight:500}
.cd{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:7px;cursor:pointer;font-size:13px;position:relative}
.cd.today{background:var(--navy)!important;color:#fff!important;font-weight:700}
.cd.sel{background:var(--gold)!important;color:#fff!important}
.cd.sat{color:#1a5ab5}.cd.wd{background:#f0f8f4}
.cd.od{background:#fef6f6;color:var(--red)}.cd.em{cursor:default;background:transparent!important}
.cd.hs::after{content:'';position:absolute;bottom:3px;width:5px;height:5px;background:var(--gold);border-radius:50%}
.cd.today.hs::after,.cd.sel.hs::after{background:#fff}
.cl{display:flex;gap:12px;margin-top:9px;flex-wrap:wrap}
.li{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--sub)}
.lb2{width:13px;height:13px;border-radius:3px;flex-shrink:0}
.cs{font-size:12px;color:var(--sub);margin-top:6px}
.tw{display:flex;gap:9px;margin-bottom:7px;align-items:flex-start}
.tt{font-size:12px;color:var(--sub);font-weight:500;flex-shrink:0;padding-top:5px;min-width:95px}
.tb{flex:1;background:var(--lb);border-left:3px solid var(--navy);border-radius:0 7px 7px 0;padding:7px 10px;font-size:13px;display:flex;justify-content:space-between;align-items:flex-start;gap:6px}
.tc{flex:1}
.db{background:none;border:none;color:#ccc;font-size:18px;cursor:pointer;padding:0 2px;flex-shrink:0;line-height:1}
.db:hover{color:var(--red)}
.bi{border-left:3px solid var(--navy);padding:9px 11px;background:#f9fbff;border-radius:0 8px 8px 0;margin-bottom:7px;position:relative}
.bi.ni2{border-left-color:var(--gold)}
.bd2x{position:absolute;top:8px;right:8px;background:none;border:none;color:#ccc;font-size:16px;cursor:pointer;line-height:1}
.bd2x:hover{color:var(--red)}
.bedit{position:absolute;top:8px;right:30px;background:none;border:none;color:#aaa;font-size:14px;cursor:pointer;line-height:1}
.bedit:hover{color:var(--navy)}
.ba{font-size:11px;color:var(--sub);margin-top:3px}
.bb{display:inline-block;background:var(--gold);color:#fff;font-size:10px;border-radius:4px;padding:1px 5px;margin-left:5px;vertical-align:middle}
.sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px}
.sc{background:#fff;border-radius:10px;border:0.5px solid var(--bd);padding:10px;text-align:center;cursor:pointer}
.av{width:44px;height:44px;border-radius:50%;color:#fff;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;margin:0 auto 6px}
.si{background:#fff;border-radius:10px;border:0.5px solid var(--bd);padding:13px;margin-bottom:11px;position:relative}
.sdx{position:absolute;top:10px;right:10px;background:none;border:none;color:#ccc;font-size:16px;cursor:pointer}
.sdx:hover{color:var(--red)}
.or{display:flex;align-items:center;gap:9px;margin-bottom:5px}
.or input[type=radio]{accent-color:var(--navy);width:17px;height:17px;flex-shrink:0}
.pb{background:var(--bd);border-radius:4px;height:6px}.pf{background:var(--navy);border-radius:4px;height:100%;transition:width 0.4s}
.fi-item{background:#fff;border-radius:10px;border:0.5px solid var(--bd);padding:12px;margin-bottom:9px;position:relative}
.fi-dl{background:var(--navy);color:#fff;border:none;border-radius:6px;padding:5px 12px;font-size:12px;cursor:pointer;margin-top:8px;font-family:inherit}
.fi-del{position:absolute;top:10px;right:10px;background:none;border:none;color:#ccc;font-size:16px;cursor:pointer}
.fi-del:hover{color:var(--red)}
.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.48);z-index:300;align-items:center;justify-content:center}
.mbg.on{display:flex}
.modal{background:#fff;border-radius:16px;width:93%;max-width:440px;padding:20px;max-height:88vh;overflow-y:auto}
.mt{font-size:17px;font-weight:700;margin-bottom:15px;color:var(--navy)}
.fg{margin-bottom:12px}
.fl{font-size:13px;color:var(--sub);margin-bottom:4px;display:block;font-weight:500}
.fi{width:100%;border:0.5px solid var(--bd);border-radius:8px;padding:10px;font-size:15px;outline:none;font-family:inherit;background:#fff}
.fi:focus{border-color:var(--navy);border-width:1.5px}
.mf{display:flex;gap:7px;justify-content:flex-end;margin-top:14px}
.fab{position:fixed;top:72px;right:12px;background:var(--gold);border:none;border-radius:50%;width:44px;height:44px;font-size:22px;color:#fff;cursor:pointer;box-shadow:0 4px 18px rgba(0,0,0,0.22);z-index:200;display:none;align-items:center;justify-content:center}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(26,58,122,0.95);color:#fff;border-radius:10px;padding:10px 20px;font-size:14px;z-index:400;display:none;white-space:nowrap}
.sr{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:11px}
.sb{background:#f8faff;border-radius:10px;border:0.5px solid var(--bd);padding:11px;text-align:center}
.sn{font-size:24px;font-weight:700;color:var(--navy)}
.sl{font-size:10px;color:var(--sub);margin-top:2px;line-height:1.3}
.tr{display:flex;gap:8px}.tr .fg{flex:1}
.ns{text-align:center;padding:18px;color:var(--sub);font-size:13px}
.eb{background:none;border:1px solid var(--bd);border-radius:6px;padding:3px 9px;font-size:12px;color:var(--sub);cursor:pointer;font-family:inherit;margin-left:8px}
.sync-bar{background:#e8f5ee;border-radius:8px;padding:6px 12px;font-size:12px;color:#2a7a4a;text-align:center;margin-bottom:8px;display:none}
</style>
</head>
<body>
<div class="app">

function listenAll(){
  if(!db) return;
  db.ref("schedData").on("value", function(snap){
    var v = snap.val();
    if(v) schedData = v;
    renderCal(); renderTodaySlots(); updateDots();
    if(selDate) renderDayDetail(selDate);
  });
  db.ref("boardData").on("value", function(snap){
    var v = snap.val();
    if(v && Array.isArray(v)) boardData = v;
    else if(v) boardData = Object.values(v);
    renderBoard(); renderHomeBoard(); updateDots();
  });
  db.ref("survData").on("value", function(snap){
    var v = snap.val();
    if(v && Array.isArray(v)) survData = v;
    else if(v) survData = Object.values(v);
    renderSurveys();
  });
  db.ref("staffData").on("value", function(snap){
    var v = snap.val();
    if(v && Array.isArray(v) && v.length > 0) staff = v;
    renderStaff(staff);
  });
  db.ref("fileData").on("value", function(snap){
    var v = snap.val();
    if(v && Array.isArray(v)) fileData = v;
    else if(v) fileData = Object.values(v);
    renderFiles(); updateFileNotice();
  });
}

    localStorage.setItem("sched2", JSON.stringify(schedData));
    localStorage.setItem("board2", JSON.stringify(boardData));
    localStorage.setItem("surv2", JSON.stringify(survData));
    localStorage.setItem("staff2", JSON.stringify(staff));

}

  document.getElementById("pg-"+pg).classList.add("on");

  document.getElementById("fabBtn").style.display=(pg==="schedule"||pg==="board"||pg==="survey"||pg==="files")?"flex":"none";

function submitModal(){
  if(modalMode==="home"){
    var v=document.getElementById("fhstaff").value;
    if(v){ hUser.name=v.split("|")[0]; hUser.dept=document.getElementById("fhdept").value||hUser.dept; }
    else { hUser.dept=document.getElementById("fhdept").value||hUser.dept; }
    hUser.ini=document.getElementById("fhini").value||hUser.ini;
    applyUser(); saveUser(); showToast(t("updated"));
  } else if(modalMode==="sched"){
    var d=document.getElementById("fdate").value;
    var ti=document.getElementById("ftitle").value.trim();
    var st=document.getElementById("fstart").value;
    var en=document.getElementById("fend").value;
    var mb=document.getElementById("fmember").value;
    if(!ti){ showToast(t("needContent")); return; }
    if(st>=en){ showToast(t("timeErr")); return; }
    if(!schedData[d]) schedData[d]=[];
    schedIdCounter++;
    schedData[d].push({id:schedIdCounter,st:st,et:en,title:ti,member:mb});
    schedData[d].sort(function(a,b){ return a.st>b.st?1:-1; });
    saveData();
    if(!dbReady){ if(selDate===d) renderDayDetail(d); renderCal(); renderTodaySlots(); updateDots(); }
    showToast(t("added"));
  } else if(modalMode==="editboard"){
    var id=parseInt(document.getElementById("feditid").value);
    var ti=document.getElementById("fedittitle").value.trim();
    var bo=document.getElementById("feditbody").value.trim();
    if(!ti){ showToast(t("needTitle")); return; }
    var b=boardData.find(function(x){ return x.id===id; });
    if(b){ b.title=ti; b.body=bo; }
    saveData();
    if(!dbReady){ renderBoard(); renderHomeBoard(); }
    showToast(t("updated"));
  } else if(modalMode==="board"){
    var ti=document.getElementById("fbtitle").value.trim();
    if(!ti){ showToast(t("needTitle")); return; }
    var bo=document.getElementById("fbbody").value.trim();
    boardData.unshift({id:Date.now(),title:ti,body:bo,author:hUser.name,time:lang==="ja"?"今":"Vừa xong",isNew:true});
    saveData();
    if(!dbReady){ renderBoard(); renderHomeBoard(); updateDots(); }
    showToast(t("posted"));
  } else if(modalMode==="survey"){
    var ti=document.getElementById("fstitle").value.trim();
    if(!ti){ showToast(t("needTitle")); return; }
    survData.unshift({id:Date.now(),title:ti,deadline:document.getElementById("fsdead").value,
      opts:[{text:document.getElementById("fs1").value||"A",votes:0},{text:document.getElementById("fs2").value||"B",votes:0}],
      total:0,done:false});
    saveData();
    if(!dbReady) renderSurveys();
    showToast(t("created"));
  } else if(modalMode==="addstaff"){
    var nm=document.getElementById("fsname").value.trim();
    var dp=document.getElementById("fsdept").value;
    if(!nm){ showToast("氏名を入力してください"); return; }
    if(!dp){ showToast("部署を選択してください"); return; }
    staff.push({id:Date.now()%100000,name:nm,dept:dp});
    saveData();
    if(!dbReady) renderStaff(staff);
    showToast("スタッフを追加しました");
  } else if(modalMode==="file"){
    var toEl=document.getElementById("ffileto");
    var fileEl=document.getElementById("ffile");
    var note=document.getElementById("ffilenote").value.trim();
    if(!toEl.value){ showToast("宛先を選択してください"); return; }
    if(!fileEl.files||!fileEl.files[0]){ showToast("ファイルを選択してください"); return; }
    var file=fileEl.files[0];
    if(file.size>5*1024*1024){ showToast("5MB以下のファイルを選択してください"); return; }
    var reader=new FileReader();
    reader.onload=function(e){
      fileData.unshift({id:Date.now(),to:toEl.value,from:hUser.name,name:file.name,size:file.size,data:e.target.result,note:note,time:"今"});
      saveFileData();
      if(!dbReady){ renderFiles(); updateFileNotice(); }
      showToast("📎 "+toEl.value+"さんにファイルを送信しました");
    };
    reader.readAsDataURL(file);
  }
  closeModal();
}

function delSched(ds,id){
  if(!confirm(t("delSched"))) return;
  if(schedData[ds]) schedData[ds]=schedData[ds].filter(function(s){ return s.id!==id; });
  saveData();
  if(!dbReady){ renderDayDetail(ds); renderCal(); renderTodaySlots(); }
  showToast(t("deleted"));
}
function delBoard(id){
  if(!confirm(t("delBoard"))) return;
  boardData=boardData.filter(function(b){ return b.id!==id; });
  saveData();
  if(!dbReady){ renderBoard(); renderHomeBoard(); }
  showToast(t("deleted"));
}
function delSurv(id){
  if(!confirm(t("delSurv"))) return;
  survData=survData.filter(function(s){ return s.id!==id; });
  saveData();
  if(!dbReady) renderSurveys();
  showToast(t("deleted"));
}
function delStaff(id){
  if(!confirm("このスタッフを削除しますか？")) return;
  staff=staff.filter(function(s){ return s.id!==id; });
  saveData();
  if(!dbReady) renderStaff(staff);
  showToast(t("deleted"));
}
function delFile(id){
  if(!confirm("このファイルを削除しますか？")) return;
  fileData=fileData.filter(function(f){ return f.id!==id; });
  saveFileData();
  if(!dbReady){ renderFiles(); updateFileNotice(); }
  showToast(t("deleted"));
}

function showToast(msg){ var el=document.getElementById("toast"); el.textContent=msg; el.style.display="block"; setTimeout(function(){ el.style.display="none"; },2500); }

function renderCal(){
  document.getElementById("calLabel").textContent=calY+"年 "+months[lang][calM-1];
  var grid=document.getElementById("calGrid"); grid.innerHTML="";
  dayNames[lang].forEach(function(d){ var h=document.createElement("div"); h.className="ch"; h.textContent=d; grid.appendChild(h); });
  var first=new Date(calY,calM-1,1).getDay(), total=new Date(calY,calM,0).getDate();
  for(var i=0;i<first;i++){ var e=document.createElement("div"); e.className="cd em"; grid.appendChild(e); }
  var wc=0,oc=0;
  for(var dd=1;dd<=total;dd++){
    (function(d){
      var ds=calY+"-"+pad(calM)+"-"+pad(d), dow=new Date(calY,calM-1,d).getDay(), off=isOff(ds);
      if(off) oc++; else wc++;
      var cls="cd";
      if(ds===todayStr) cls+=" today";
      else if(ds===selDate) cls+=" sel";
      else if(off) cls+=" od";
      else if(dow===6) cls+=" sat wd";
      else cls+=" wd";
      if(schedData[ds]&&schedData[ds].length) cls+=" hs";
      var el=document.createElement("div"); el.className=cls; el.textContent=d;
      el.onclick=(function(ds){ return function(){ selectDay(ds); }; })(ds);
      grid.appendChild(el);
    })(dd);
  }
  document.getElementById("calSum").textContent=lang==="ja"?
    calM+t("workCnt")+wc+t("dayu")+t("offCnt")+oc+t("dayu"):
    months[lang][calM-1]+": "+t("workCnt")+wc+t("dayu")+t("offCnt")+oc+t("dayu");
}
function chMonth(dir){ calM+=dir; if(calM>12){calM=1;calY++;} if(calM<1){calM=12;calY--;} renderCal(); }
function selectDay(ds){ selDate=ds; renderCal(); renderDayDetail(ds); document.getElementById("defCard").style.display="none"; document.getElementById("dayCard").style.display="block"; }
function renderDayDetail(ds){
  var parts=ds.split("-");
  var dow=dayNames[lang][new Date(parseInt(parts[0]),parseInt(parts[1])-1,parseInt(parts[2])).getDay()];
  document.getElementById("dayTitle").textContent=lang==="ja"?"📅 "+parts[1]+"月"+parts[2]+"日（"+dow+"）":"📅 Ngày "+parts[2]+"/"+parts[1]+" ("+dow+")";
  var slots=document.getElementById("daySlots"), noEl=document.getElementById("noSched");
  noEl.textContent=t("noSched");
  var data=schedData[ds]||[];
  if(!data.length){ slots.innerHTML=""; noEl.style.display="block"; return; }
  noEl.style.display="none"; slots.innerHTML="";
  data.forEach(function(s){
    var row=document.createElement("div"); row.className="tw";
    var timeStr=s.st+(s.et?" ～ "+s.et:"");
    var mid=s.member?"<div style='font-size:12px;color:var(--sub);margin-top:3px'>👤 "+s.member+"</div>":"";
    var btn=document.createElement("button"); btn.className="db"; btn.textContent="✕";
    btn.onclick=(function(ds2,id){ return function(){ delSched(ds2,id); }; })(ds,s.id);
    row.innerHTML="<div class='tt'>"+timeStr+"</div><div class='tb'><div class='tc'><div style='font-weight:600;font-size:15px'>"+s.title+"</div>"+mid+"</div></div>";
    row.querySelector(".tb").appendChild(btn);
    slots.appendChild(row);
  });
}

function renderBoard(){
  var list=document.getElementById("boardList"); list.innerHTML="";
  if(!boardData.length){ list.innerHTML="<div style='text-align:center;padding:20px;color:var(--sub)'>"+t("noBoard")+"</div>"; return; }
  boardData.forEach(function(b){
    var el=document.createElement("div"); el.className="bi"+(b.isNew?" ni2":"");
    var nb=b.isNew?"<span class='bb'>"+t("newBadge")+"</span>":"";
    var delBtn=document.createElement("button"); delBtn.className="bd2x"; delBtn.textContent="✕";

    el.appendChild(editBtn); el.appendChild(delBtn);
    list.appendChild(el);
  });
}

    c.appendChild(el);

function renderSurveys(){
  var list=document.getElementById("surveyList"); list.innerHTML="";
  if(!survData.length){ list.innerHTML="<div style='text-align:center;padding:20px;color:var(--sub)'>"+t("noSurvey")+"</div>"; return; }
  survData.forEach(function(sv){
    var el=document.createElement("div"); el.className="si";
    var max=sv.total||1;
    var dlEl=sv.deadline?t("deadline")+": "+sv.deadline+" ・ ":"";
    el.innerHTML="<div style='font-size:16px;font-weight:700;margin-bottom:7px;padding-right:24px'>"+sv.title+"</div><div style='font-size:13px;color:var(--sub);margin-bottom:11px'>"+dlEl+t("answers")+": "+sv.total+t("persons")+"</div>";
    sv.opts.forEach(function(o,i){
      var pct=Math.round(o.votes/max*100);
      var row=document.createElement("div"); row.className="or";
      var inp=document.createElement("input"); inp.type="radio"; inp.name="sv"+sv.id; inp.id="sv"+sv.id+"o"+i;
      if(sv.done) inp.disabled=true;
      inp.onchange=(function(sid,oi){ return function(){ voteSurv(sid,oi); }; })(sv.id,i);
      var lbl=document.createElement("label"); lbl.htmlFor="sv"+sv.id+"o"+i; lbl.style.cssText="font-size:15px;flex:1"; lbl.textContent=o.text;
      var cnt=document.createElement("span"); cnt.style.cssText="font-size:13px;color:var(--sub);min-width:38px;text-align:right"; cnt.textContent=o.votes+t("votes");
      row.appendChild(inp); row.appendChild(lbl); row.appendChild(cnt); el.appendChild(row);
      var barWrap=document.createElement("div"); barWrap.style.marginBottom="9px";
      barWrap.innerHTML="<div class='pb'><div class='pf' id='pf"+sv.id+"i"+i+"' style='width:"+pct+"%'></div></div>";
      el.appendChild(barWrap);
    });
    var delBtn=document.createElement("button"); delBtn.className="sdx"; delBtn.textContent="✕";
    delBtn.onclick=(function(id){ return function(){ delSurv(id); }; })(sv.id);
    el.appendChild(delBtn); list.appendChild(el);
  });
}
function voteSurv(id,oi){
  var sv=survData.find(function(s){ return s.id===id; }); if(!sv||sv.done) return;
  sv.opts[oi].votes++; sv.total++; sv.done=true;
  var max=sv.total;
  sv.opts.forEach(function(o,i){ var el=document.getElementById("pf"+id+"i"+i); if(el) el.style.width=Math.round(o.votes/max*100)+"%"; });
  document.querySelectorAll("input[name='sv"+id+"']").forEach(function(r){ r.disabled=true; });
  saveData(); showToast(t("voted"));
}

function renderFiles(){
  var list=document.getElementById("fileList"); list.innerHTML="";
  if(!fileData.length){ list.innerHTML="<div style='text-align:center;padding:20px;color:var(--sub)'>"+t("noFile")+"</div>"; return; }
  fileData.forEach(function(f){
    var el=document.createElement("div"); el.className="fi-item";
    var size=f.size>1024*1024?(f.size/1024/1024).toFixed(1)+"MB":(f.size/1024).toFixed(0)+"KB";
    var isImg=f.data&&f.data.startsWith("data:image");
    var preview=isImg?"<img src='"+f.data+"' style='max-width:100%;max-height:120px;border-radius:6px;margin-top:6px;display:block'>":"";
    var delBtn=document.createElement("button"); delBtn.className="fi-del"; delBtn.textContent="✕";
    delBtn.onclick=(function(id){ return function(){ delFile(id); }; })(f.id);
    var dlBtn=document.createElement("button"); dlBtn.className="fi-dl"; dlBtn.textContent="⬇ ダウンロード";
    dlBtn.onclick=(function(data,name){ return function(){ var a=document.createElement("a"); a.href=data; a.download=name; a.click(); }; })(f.data,f.name);
    el.innerHTML="<div style='font-weight:600;font-size:14px'>"+f.name+"</div><div style='font-size:12px;color:var(--sub);margin-top:2px'>宛先: <b>"+f.to+"</b> ← 送信者: "+f.from+" ・ "+size+(f.note?" ・ "+f.note:"")+"</div>"+preview;
    el.appendChild(dlBtn); el.appendChild(delBtn); list.appendChild(el);
  });
}
function updateFileNotice(){
  var myFiles=fileData.filter(function(f){ return f.to===hUser.name; });
  var card=document.getElementById("fileNoticeCard"), notice=document.getElementById("fileNotice");
  if(!myFiles.length){ card.style.display="none"; return; }
  card.style.display="block"; notice.innerHTML="";
  myFiles.forEach(function(f){
    var el=document.createElement("div"); el.style.cssText="padding:8px 0;border-bottom:0.5px solid var(--bd);display:flex;justify-content:space-between;align-items:center";
    var size=f.size>1024*1024?(f.size/1024/1024).toFixed(1)+"MB":(f.size/1024).toFixed(0)+"KB";
    el.innerHTML="<div><div style='font-size:14px;font-weight:600'>📎 "+f.name+"</div><div style='font-size:11px;color:var(--sub)'>"+f.from+"さんから ・ "+size+"</div></div>";
    var dlBtn=document.createElement("button"); dlBtn.textContent="⬇"; dlBtn.style.cssText="background:var(--navy);color:#fff;border:none;border-radius:6px;padding:6px 10px;cursor:pointer;font-size:13px";
    dlBtn.onclick=(function(data,name){ return function(){ var a=document.createElement("a"); a.href=data; a.download=name; a.click(); }; })(f.data,f.name);
    el.appendChild(dlBtn); notice.appendChild(el);
  });
}

function renderStaff(data){
  var grid=document.getElementById("staffGrid"); grid.innerHTML="";
  var colors=["#1a3a7a","#2a5ab5","#e8a020","#2a7a4a","#8a2020","#6a2a8a","#1a6a7a"];
  data.forEach(function(s){
    var ini=s.name.replace(/[a-zA-Z\s]/g,"").slice(0,2)||s.name.slice(0,2);
    var dept=lang==="vi"?(deptVi[s.dept]||s.dept):s.dept;
    var col=colors[s.id%7];
    var card=document.createElement("div"); card.className="sc"; card.style.position="relative";
    var delBtn=document.createElement("button"); delBtn.textContent="✕"; delBtn.style.cssText="position:absolute;top:4px;right:4px;background:none;border:none;color:#ccc;font-size:14px;cursor:pointer";
    delBtn.onclick=(function(id){ return function(){ delStaff(id); }; })(s.id);
    card.innerHTML="<div class='av' style='background:"+col+"'>"+ini+"</div><div style='font-size:12px;font-weight:600;color:#1a1a2e;line-height:1.3;margin-bottom:2px'>"+s.name+"</div><div style='font-size:11px;color:var(--sub)'>"+dept+"</div>";
    card.appendChild(delBtn); grid.appendChild(card);
  });
}
function filterStaff(q){ renderStaff(staff.filter(function(s){ return s.name.toLowerCase().includes(q.toLowerCase())||s.dept.includes(q)||(deptVi[s.dept]||"").toLowerCase().includes(q.toLowerCase()); })); }

function renderTodaySlots(){
  var d=new Date();
  document.getElementById("todayDate").textContent=lang==="ja"?(d.getMonth()+1)+"月"+d.getDate()+"日":"Ngày "+d.getDate()+"/"+(d.getMonth()+1);
  var data=schedData[todayStr]||[];
  document.getElementById("todayCnt").textContent=data.length;
  var c=document.getElementById("todaySlots"); c.innerHTML="";
  if(!data.length){ c.innerHTML="<div style='color:var(--sub);font-size:14px;text-align:center;padding:10px'>"+t("noToday")+"</div>"; return; }
  data.forEach(function(s){
    var row=document.createElement("div"); row.className="tw";
    var timeStr=s.st+(s.et?" ～ "+s.et:"");
    var mid=s.member?"<div style='font-size:12px;color:var(--sub);margin-top:2px'>👤 "+s.member+"</div>":"";
    row.innerHTML="<div class='tt'>"+timeStr+"</div><div class='tb'><div class='tc'><div style='font-weight:600;font-size:15px'>"+s.title+"</div>"+mid+"</div></div>";
    c.appendChild(row);
  });
}

function applyUser(){
  document.getElementById("hname").textContent=hUser.name;
  document.getElementById("hdept").textContent=hUser.dept;
  document.getElementById("hav").textContent=hUser.ini;
}

function updateDots(){
  var newCount=boardData.filter(function(b){ return b.isNew; }).length;
  var bDot=document.getElementById("bDot"); bDot.textContent=newCount; bDot.style.display=newCount>0?"flex":"none";
  var todayCount=(schedData[todayStr]||[]).length;
  var sDot=document.getElementById("sDot"); sDot.textContent=todayCount; sDot.style.display=todayCount>0?"flex":"none";
  document.getElementById("todayCnt").textContent=todayCount;
  document.getElementById("unreadCnt").textContent=newCount;
}

function renderAll(){
  renderCal(); renderBoard(); renderHomeBoard(); renderSurveys(); renderStaff(staff); renderTodaySlots(); renderFiles();
  updateDots(); updateFileNotice();
}

// ===== 初期化 =====
loadUser();
applyUser();
renderAll();
// Firebase SDKロード後に初期化
window.addEventListener('load', function(){
  initFirebase();
});

// Firebase接続状態表示
if(typeof firebase !== "undefined"){
  var syncBar = document.getElementById("syncBar");
  syncBar.style.display = "block";
  setTimeout(function(){ syncBar.style.display = "none"; }, 3000);
}
</script>
